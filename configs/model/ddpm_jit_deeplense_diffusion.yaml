name: "ddpm_jit"
type: "diffusion"

loss_type: "v"
prediction_type: "x"

backbone:
  input_size: 150       # Must match your dataset image size
  in_channels: 1
  patch_size: 15     
  hidden_size: 160    
  depth: 6             
  num_heads: 4
  mlp_ratio: 4.0
  num_classes: 1       # Set to 1 for unconditional
  in_context_len: 0    # Set to 0 if you don't need in-context conditioning
  attn_drop: 0.0
  proj_drop: 0.0
  bottleneck_dim: 64
  in_context_start: 8

# Diffusion specific settings passed to get_noise_schedule()
defaults:
  - schedule: cosine

metrics: {}